name: docker build

on:
  push:

permissions:
  contents: read
  # Read access to GHCR so the build can pull the shared :buildcache layer
  # cache written by github-packages-publish.yaml. This workflow never
  # writes cache (no cache-to) — it only consumes.
  packages: read


jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Compute setuptools_scm version
        id: scm
        run: |
          version=$(uvx --from 'setuptools-scm>=8.1.0' python -m setuptools_scm)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Registry-cache reads (type=registry, mode=max manifests) need the
      # docker-container driver; the default docker driver only understands
      # inline caches.
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into ghcr.io for cache pulls
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same cargo cache setup as github-packages-publish.yaml: the Dockerfile
      # compiles the gs_clustering crate with BuildKit `--mount=type=cache`
      # mounts, which are ephemeral on throwaway runners. Without this, any
      # push that touches ./rust recompiles the arrow/pyo3 dependency tree
      # from scratch here. Identical cache key as the publish workflow, so the
      # two share one cache entry and this workflow rarely uploads anything.
      - name: Cache Rust build (cargo)
        id: cargo-cache
        uses: actions/cache@v4
        with:
          path: |
            cargo-registry
            cargo-git
            cargo-target
          key: buildkit-cargo-${{ hashFiles('rust/gs_clustering/Cargo.lock') }}
          restore-keys: |
            buildkit-cargo-
      - name: Inject cargo cache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              "cargo-registry": "/root/.cargo/registry",
              "cargo-git": "/root/.cargo/git",
              "cargo-target": "/opt/graphsense/lib/rust/gs_clustering/target"
            }
          skip-extraction: ${{ steps.cargo-cache.outputs.cache-hit }}

      # `load: true` exports the built image from the buildx container into
      # the runner's docker daemon so the guard step below can `docker run` it.
      # A missing :buildcache tag (first run, or after cache tag cleanup) is a
      # warning, not an error — the build just runs uncached.
      - name: Docker Image smoke test
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: false
          load: true
          tags: graphsense-lib:smoke
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_GRAPHSENSE_LIB=${{ steps.scm.outputs.version }}

      - name: Importlib resources guard
        # Regression guard: v2.12.2 dropped .git from the build context. With
        # include-package-data=true and no VCS root, the wheel shipped zero
        # *.yaml / *.csv / *.sql resources and the container crashed at
        # startup loading taxonomies. This step exercises every package
        # whose data files are loaded at runtime.
        run: |
          docker run --rm -i --entrypoint python graphsense-lib:smoke - <<'PY'
          import sys
          import importlib.resources as r

          probes = [
              ("graphsenselib.tagpack.db", "concepts.yaml"),
              ("graphsenselib.tagpack.db", "countries.csv"),
              ("graphsenselib.tagpack.db", "confidence.csv"),
              ("graphsenselib.tagpack.conf", "tagpack_schema.yaml"),
              ("graphsenselib.tagpack.conf", "actorpack_schema.yaml"),
              ("graphsenselib.schema.resources", "transformed_utxo_schema.sql"),
              ("graphsenselib.schema.resources.migrations", "raw_account_0_to_1.sql"),
              ("graphsenselib.tagstore.db", "init.sql"),
              ("graphsenselib.ingest.resources", "eth_genesis_transfers.csv"),
          ]
          failures = []
          for pkg, name in probes:
              try:
                  size = len(r.files(pkg).joinpath(name).read_bytes())
                  print(f"OK   {pkg}/{name}  ({size} bytes)")
              except Exception as e:
                  failures.append(f"{pkg}/{name}: {e!r}")
                  print(f"FAIL {pkg}/{name}: {e!r}", file=sys.stderr)

          # Also drive the production code path that crashed in 2.12.2.
          try:
              from graphsenselib.tagpack.taxonomy import _load_taxonomies
              _load_taxonomies({"taxonomies": {
                  "country": "src/tagpack/db/countries.csv",
                  "confidence": "src/tagpack/db/confidence.csv",
                  "concept": "src/tagpack/db/concepts.yaml",
              }})
              print("taxonomy loader OK")
          except Exception as e:
              failures.append(f"_load_taxonomies: {e!r}")
              print(f"FAIL taxonomy loader: {e!r}", file=sys.stderr)

          if failures:
              print(f"\n{len(failures)} resource(s) missing from image:", file=sys.stderr)
              for f in failures:
                  print(f"  - {f}", file=sys.stderr)
              sys.exit(1)
          PY

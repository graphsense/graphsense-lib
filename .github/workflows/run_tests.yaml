name: Unit Tests and Build

on:
  push:
    branches:
      - master
      - develop

  pull_request:

  workflow_dispatch:

  # allow other workflows (e.g. image publish) to gate on the test suite
  workflow_call:

permissions:
  contents: read


jobs:
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run Rust unit tests
        run: make test-rust

  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: fix openssl legacy mode
        run: sudo sed -i '/^default = default_sect/a legacy = legacy_sect' /etc/ssl/openssl.cnf &&  sudo sed -i 's/#openssl_conf/openssl_conf/g' /etc/ssl/openssl.cnf && sudo sed -i '/^\[default_sect\]/a activate = 1\n\[legacy_sect\]\nactivate = 1' /etc/ssl/openssl.cnf
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install requirements
        run: uv sync --python=${{ matrix.python }}
      - name: Run Unit Tests
        run: make test-ci
      - name: Run Unit Tests with base dependencies
        run: make test-with-base-dependencies-ci
      - name: Run Lint
        run: make lint
      - name: Run type check
        run: make type-check
      - name: Validate MCP curation (drift gate)
        run: make mcp-validate-curation
      - name: Build wheel
        run: make build

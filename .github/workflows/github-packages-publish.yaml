name: Publish to Github Docker Hub

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
      - 'feature/**'
    tags: [ 'v*.*.*' ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  # Gate: never publish an image from code that hasn't passed the test suite.
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/run_tests.yaml

  build:
    needs: test

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Compute the package version on the runner — where the full worktree
      # and tags are present — and pass it into the Docker build as a
      # build-arg. The Dockerfile only COPYs a subset of the tree, so an
      # in-container `git describe` would see "deleted" tracked files and
      # emit a dirty/dev0 version even for clean release tags.
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Compute setuptools_scm version
        id: scm
        run: |
          version=$(uvx --from 'setuptools-scm>=8.1.0' python -m setuptools_scm)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Computed version: $version"

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.4.0
        with:
          cosign-release: 'v2.2.2'

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels, annotations) for Docker.
      # Annotations on the manifest (index) level are what GHCR reads to
      # render the package description in the UI; image-config LABELs in
      # the Dockerfile are NOT enough once buildx publishes an attestation
      # manifest list (which is the default in v5+ and shows up in GHCR
      # as "OS / Arch 2").
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        env:
          # Emit annotations on both the per-arch manifests and the index
          # so all GHCR views (including the multi-arch summary page)
          # display the description.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Disable the implicit latest tag from flavor=auto so only the
          # explicit type=raw,value=latest rule below controls latest.
          flavor: |
            latest=false
          # Tag strategy:
          # - tag pushes (rc / stable / opt-in -dev.N) preserve current behavior:
          #   the exact Git tag plus a rolling channel alias.
          # - branch pushes (no git tag) produce a per-branch slug + immutable
          #   short-SHA so dev images are pin-friendly without hand-minted tags.
          #   The 'develop' branch additionally gets the rolling 'dev' alias.
          tags: |
            type=ref,event=tag
            type=raw,value=rc,enable=${{ github.ref_type == 'tag' && contains(github.ref_name, '-rc.') }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-dev.') && !contains(github.ref_name, '+') }}
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          # `labels` populates image-config OCI labels (including
          # org.opencontainers.image.description sourced from the GitHub
          # repo description). `annotations` populates manifest-level
          # OCI annotations — that is what GHCR's UI actually reads to
          # show "Description" on the package version page. Without the
          # annotations input, the UI shows "No description provided"
          # even when the description label is present on the image
          # config.
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_GRAPHSENSE_LIB=${{ steps.scm.outputs.version }}

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

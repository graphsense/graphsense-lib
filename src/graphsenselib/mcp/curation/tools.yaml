version: 1

defaults:
  tag_prefix: "gs_"

# Positive list: every operation_id here becomes an auto-generated MCP tool.
# Anything NOT here is excluded from the tool surface. Drift is caught at boot
# (see graphsenselib.mcp.curation.validate_against_app).
include:

  get_statistics:
    description: >
      THE source for "what currencies / blockchains / networks does the
      platform support". Returns a snapshot of every supported network
      (e.g. BTC, ETH, LTC, BCH, ZEC, TRX), with its latest indexed block,
      data freshness, and per-network token catalog. Use this first when
      orienting yourself or whenever the user asks which currencies or
      networks are available — DO NOT call `list_supported_tokens` for
      that, which is a per-network drill-down and requires you to
      already know the network.
    tags: ["network-level", "overview"]

  search:
    description: >
      Global search across supported networks for a free-text query. Matches
      addresses, transactions, blocks, and labels. Use this when the user gives
      you an identifier but hasn't specified which network or which kind of
      object it is.
    tags: ["search", "network-level"]

  get_block:
    description: "Fetch a single block by height in the given network."
    tags: ["block-level"]

  get_block_by_date:
    description: >
      Find the block nearest to a given date/time in the given network. Use
      this to translate timestamps into block heights before calling
      block-level or rate-level tools.
    tags: ["block-level", "time"]

  list_block_txs:
    description: "List transactions contained in a given block."
    tags: ["block-level", "transaction-level"]

  graph_summary:
    description: >
      Aggregate stats over a SET of transactions and/or addresses, not a
      single item. Each item carries its own network, so the
      set may span chains (btc + eth + ...). Returns per-node-type blocks:
      a network-agnostic overall rollup (fiat totals, timestamp span, tag
      overview) plus one per-network block with native base-unit values.
      Use for "summarize these N transactions/addresses together"; for one
      item use lookup_tx_details / lookup_address instead. Each non-empty
      list needs 2+ distinct entries; combined max 100.
    tags: ["transaction-level", "address-level", "aggregate"]

  list_tx_flows:
    description: >
      Paginated per-event value-flow listing for ONE transaction. The
      account-model companion to `lookup_tx_details`: every base / internal
      / token transfer inside the tx (sender, receiver, asset, value),
      paginated because aggregator/bundler/exploit txs can fan out into
      hundreds of events. Use `lookup_tx_details` first for the consolidated
      tx body (IO list, traces, conversions); reach for `list_tx_flows`
      when you need to walk every flow event in an account-model tx and
      the count isn't bounded. UTXO chains carry the equivalent
      information in the tx's `inputs`/`outputs`, so this endpoint is
      account-model focused. Each event carries its own `identifier`
      (the sub-payment id within the parent `tx_hash`); pass that
      `identifier` — not the bare `tx_hash` — when feeding the event
      into `build_pathfinder_file`, so pathfinder can render the
      specific sub-payment.
    tags: ["transaction-level", "account-model"]

  get_exchange_rates:
    description: >
      Exchange rates for the given network at the given block height. Returns
      the fiat value (USD, EUR, ...) of one unit of the native asset at that
      height.
    tags: ["rates", "network-level"]

  list_supported_tokens:
    description: >
      Catalog of tokens (e.g. ERC-20 on ETH, TRC-20 on TRX) tracked WITHIN
      one specific network — requires a `currency` argument naming that
      network. Use only when the user is asking about tokens inside a
      network you already know. NOT the tool to answer "what currencies
      / networks does the platform support" — for that, call
      `get_statistics`, which lists every supported network in one call.
      Networks without an in-network token model (BTC, LTC, BCH, …)
      return an empty list; that does not mean the network is
      unsupported — it means it has no tokens to list.
    tags: ["network-level", "tokens"]

  get_actor:
    description: >
      Metadata about a named actor (exchange, mixer, service). Returns the
      actor's jurisdiction, categories, and descriptive fields. Use this to
      expand an actor reference found on a tag.
    tags: ["actor-level"]

  list_taxonomies:
    description: >
      List the tag taxonomies (category vocabularies) used by the platform.
      Cheap and useful when you want to build a filter of matching categories.
    tags: ["metadata"]

  list_concepts:
    description: "List concepts (leaf labels) inside a given taxonomy."
    tags: ["metadata"]

# Hand-written tools that replace multiple auto-generated ones. These are
# registered in Python (see module field); their presence here is what makes
# the validator treat the 'replaces' op_ids as excluded from auto-exposure.
consolidated_tools:

  - name: lookup_address
    replaces:
      - get_address
      - get_address_entity
      - get_tag_summary_by_address
      - list_related_addresses
    module: graphsenselib.mcp.tools.consolidated:register_lookup_address

  - name: lookup_cluster
    replaces:
      - get_entity
      - get_cluster
      - list_address_tags_by_entity
      - list_address_tags_by_cluster
    module: graphsenselib.mcp.tools.consolidated:register_lookup_cluster

  - name: lookup_tx_details
    replaces:
      - get_tx
      - get_tx_io
      - get_spending_txs
      - get_spent_in_txs
      - get_tx_conversions
    module: graphsenselib.mcp.tools.consolidated:register_lookup_tx_details

  - name: list_neighbors
    replaces:
      - list_address_neighbors
    module: graphsenselib.mcp.tools.consolidated:register_list_neighbors

  - name: list_txs_for
    replaces:
      - list_address_txs
      - list_address_links
    module: graphsenselib.mcp.tools.consolidated:register_list_txs_for

  - name: list_tags_by_address
    replaces:
      - list_tags_by_address
    module: graphsenselib.mcp.tools.consolidated:register_list_tags_by_address

  - name: build_pathfinder_file
    replaces: []
    module: graphsenselib.mcp.tools.pathfinder_export:register

# Tools that forward to an external service rather than the FastAPI app.
external_tools:

  search_neighbors:
    module: graphsenselib.mcp.tools.search_neighbors:register
    enabled: true
